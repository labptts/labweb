<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LAB — Interactive Universe</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      font-family: 'Inter', 'SF Pro Display', 'Segoe UI', Arial, sans-serif;
    }

    canvas {
      display: block;
    }

    /* Навигация сверху */
    #top-nav {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 80px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 40px;
      z-index: 50;
      pointer-events: none;
    }

    #top-nav a,
    #top-nav span {
      pointer-events: auto;
    }

    .nav-link {
      color: rgba(255, 255, 255, 0.7);
      text-decoration: none;
      font-size: 14px;
      font-weight: 400;
      letter-spacing: 0.02em;
      transition: color 0.3s, text-shadow 0.3s;
      cursor: pointer;
    }

    .nav-link:hover {
      color: rgba(255, 255, 255, 1);
      text-shadow: 0 0 20px rgba(255, 255, 255, 0.4);
    }

    #nav-logo {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      height: 36px;
      filter: drop-shadow(0 0 15px rgba(255, 255, 255, 0.3))
              drop-shadow(0 0 30px rgba(180, 200, 255, 0.2));
      transition: filter 0.3s;
    }

    #nav-logo:hover {
      filter: drop-shadow(0 0 20px rgba(255, 255, 255, 0.5))
              drop-shadow(0 0 40px rgba(180, 200, 255, 0.35));
    }

    .nav-link .line1,
    .nav-link .line2 {
      display: inline;
    }

    /* Мобильная адаптация навигации */
    @media (max-width: 600px) {
      #top-nav {
        padding: 0 20px;
        height: 70px;
      }

      .nav-link {
        font-size: 12px;
        line-height: 1.4;
      }

      .nav-link .line1 {
        display: block;
      }

      .nav-link .line2 {
        display: block;
      }

      #nav-project-list {
        text-align: left;
      }

      #nav-download {
        text-align: right;
      }

      #nav-logo {
        height: 28px;
      }
    }

    /* Модальное окно — premium glass */
    #modal-overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.85);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      z-index: 100;
      justify-content: center;
      align-items: center;
    }

    #modal-overlay.active {
      display: flex;
    }

    #modal-content {
      background: rgba(15, 15, 25, 0.9);
      border: 1px solid rgba(184, 255, 1, 0.25);
      color: #fff;
      border-radius: 16px;
      max-width: 900px;
      width: 90%;
      max-height: 90vh;
      position: relative;
      overflow: hidden;
      box-shadow:
        0 0 80px rgba(184, 255, 1, 0.12),
        0 0 160px rgba(184, 255, 1, 0.04);
    }

    .modal-video-container {
      position: relative;
      width: 100%;
      padding-top: 56.25%; /* 16:9 */
      background: #000;
    }

    .modal-video-container iframe,
    .modal-video-container video {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    .modal-info {
      padding: 24px 32px 32px;
    }

    .modal-type {
      font-size: 12px;
      font-weight: 400;
      letter-spacing: 0.1em;
      color: rgba(180, 200, 220, 0.6);
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    .modal-client {
      font-size: 28px;
      font-weight: 700;
      margin: 0 0 4px;
      letter-spacing: -0.01em;
    }

    .modal-subtitle {
      font-size: 16px;
      font-weight: 300;
      color: rgba(255, 255, 255, 0.7);
      margin: 0;
    }

    #modal-close {
      position: absolute;
      top: 16px;
      right: 16px;
      width: 40px;
      height: 40px;
      background: rgba(0, 0, 0, 0.5);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 50%;
      color: rgba(255, 255, 255, 0.7);
      font-size: 24px;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 10;
    }

    #modal-close:hover {
      background: rgba(255, 255, 255, 0.1);
      color: #fff;
    }

    @media (max-width: 600px) {
      #modal-content {
        width: 95%;
        max-height: 85vh;
      }

      .modal-info {
        padding: 16px 20px 24px;
      }

      .modal-client {
        font-size: 22px;
      }

      .modal-subtitle {
        font-size: 14px;
      }

      #modal-close {
        top: 12px;
        right: 12px;
        width: 36px;
        height: 36px;
      }
    }

    /* Gallery в модалке */
    .modal-gallery {
      max-height: 60vh;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 4px;
      background: #000;
    }

    .modal-gallery::-webkit-scrollbar {
      width: 6px;
    }

    .modal-gallery::-webkit-scrollbar-track {
      background: rgba(255,255,255,0.03);
    }

    .modal-gallery::-webkit-scrollbar-thumb {
      background: rgba(184, 255, 1, 0.25);
      border-radius: 3px;
    }

    .gallery-img {
      width: 100%;
      height: auto;
      display: block;
      object-fit: contain;
    }

    @media (max-width: 600px) {
      .modal-gallery {
        max-height: 50vh;
      }
    }

    /* Виньетка */
    #vignette {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 10;
      background: radial-gradient(
        ellipse at center,
        transparent 50%,
        rgba(0, 0, 0, 0.5) 100%
      );
    }

    /* ===== Loading Screen ===== */
    #loading-screen {
      position: fixed;
      inset: 0;
      z-index: 9999;
      background: #000;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      transition: opacity 0.8s ease, visibility 0.8s ease;
    }

    #loading-screen.hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    #loading-screen .logo-wrap {
      position: relative;
      margin-bottom: 48px;
    }

    #loading-screen .logo-wrap img {
      height: 48px;
      animation: loadLogoPulse 2s ease-in-out infinite;
      filter: drop-shadow(0 0 30px rgba(184,255,1,0.25));
    }

    @keyframes loadLogoPulse {
      0%, 100% { opacity: 0.7; transform: scale(1); filter: drop-shadow(0 0 20px rgba(184,255,1,0.2)); }
      50%      { opacity: 1;   transform: scale(1.04); filter: drop-shadow(0 0 40px rgba(184,255,1,0.5)); }
    }

    /* Ring spinner */
    #loading-screen .spinner {
      width: 56px;
      height: 56px;
      position: relative;
    }

    #loading-screen .spinner .ring {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      border: 2px solid transparent;
    }

    #loading-screen .spinner .ring:nth-child(1) {
      border-top-color: rgba(184,255,1,0.8);
      animation: spinRing 1.2s cubic-bezier(.55,.15,.45,.85) infinite;
    }

    #loading-screen .spinner .ring:nth-child(2) {
      inset: 6px;
      border-right-color: rgba(184,255,1,0.5);
      animation: spinRing 1.6s cubic-bezier(.55,.15,.45,.85) infinite reverse;
    }

    #loading-screen .spinner .ring:nth-child(3) {
      inset: 12px;
      border-bottom-color: rgba(184,255,1,0.3);
      animation: spinRing 2s cubic-bezier(.55,.15,.45,.85) infinite;
    }

    @keyframes spinRing {
      to { transform: rotate(360deg); }
    }

    /* Progress bar */
    #loading-screen .progress-track {
      margin-top: 40px;
      width: 180px;
      height: 2px;
      background: rgba(255,255,255,0.08);
      border-radius: 2px;
      overflow: hidden;
    }

    #loading-screen .progress-bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, rgba(184,255,1,0.9), rgba(200,255,100,0.9));
      border-radius: 2px;
      transition: width 0.3s ease;
    }

    #loading-screen .loading-text {
      margin-top: 16px;
      font-size: 11px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.35);
      font-weight: 300;
    }

    /* ===== Project List View ===== */
    #project-list-view {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 40;
      background: rgba(0, 0, 0, 0.92);
      backdrop-filter: blur(30px);
      -webkit-backdrop-filter: blur(30px);
      overflow-y: auto;
      padding: 120px 40px 60px;
    }

    #project-list-view.active {
      display: block;
    }

    .pl-list {
      max-width: 800px;
      margin: 0 auto;
      list-style: none;
    }

    .pl-item {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      padding: 18px 0;
      border-bottom: 1px solid rgba(255, 255, 255, 0.06);
      cursor: pointer;
      transition: all 0.25s ease;
    }

    .pl-item:hover {
      padding-left: 12px;
    }

    .pl-item:hover .pl-client {
      color: #B8FF01;
      text-shadow: 0 0 20px rgba(184, 255, 1, 0.3);
    }

    .pl-item:hover .pl-subtitle {
      color: rgba(184, 255, 1, 0.6);
    }

    .pl-left {
      display: flex;
      align-items: baseline;
      gap: 16px;
      min-width: 0;
    }

    .pl-client {
      font-size: 22px;
      font-weight: 700;
      color: #fff;
      transition: color 0.25s, text-shadow 0.25s;
      white-space: nowrap;
    }

    .pl-subtitle {
      font-size: 15px;
      font-weight: 300;
      color: rgba(255, 255, 255, 0.5);
      transition: color 0.25s;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .pl-type {
      font-size: 11px;
      font-weight: 400;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.3);
      white-space: nowrap;
      flex-shrink: 0;
    }

    @media (max-width: 600px) {
      #project-list-view {
        padding: 100px 20px 40px;
      }

      .pl-item {
        flex-direction: column;
        gap: 4px;
        padding: 14px 0;
      }

      .pl-client {
        font-size: 18px;
      }

      .pl-subtitle {
        font-size: 13px;
      }
    }

    /* Email внизу */
    #bottom-email {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 50;
      pointer-events: auto;
    }

    #bottom-email a {
      color: rgba(255, 255, 255, 0.55);
      text-decoration: none;
      font-size: 13px;
      font-weight: 300;
      letter-spacing: 0.03em;
      transition: color 0.3s, text-shadow 0.3s;
      text-shadow:
        0 0 4px rgba(0, 0, 0, 0.8),
        0 0 12px rgba(0, 0, 0, 0.5);
    }

    #bottom-email a:hover {
      color: rgba(255, 255, 255, 0.9);
      text-shadow:
        0 0 4px rgba(0, 0, 0, 0.8),
        0 0 20px rgba(184, 255, 1, 0.3);
    }

    @media (max-width: 600px) {
      #bottom-email {
        bottom: 32px;
      }

      #bottom-email a {
        font-size: 12px;
      }
    }
  </style>
</head>
<body>
  <!-- Loading Screen -->
  <div id="loading-screen">
    <div class="logo-wrap">
      <img src="/Logo_lab_web.svg" alt="LAB">
    </div>
    <div class="spinner">
      <div class="ring"></div>
      <div class="ring"></div>
      <div class="ring"></div>
    </div>
    <div class="progress-track">
      <div class="progress-bar" id="load-progress"></div>
    </div>
    <div class="loading-text">Loading universe</div>
  </div>

  <!-- Навигация сверху -->
  <nav id="top-nav">
    <a href="#" class="nav-link" id="nav-project-list"><span class="line1">Project</span> <span class="line2">list view</span></a>
    <img src="/Logo_lab_web.svg" alt="LAB" id="nav-logo">
    <a href="https://labstudioweb.s3.eu-north-1.amazonaws.com/LAB_2026.pdf" target="_blank" rel="noopener" class="nav-link" id="nav-download"><span class="line1">Download</span> <span class="line2">.pdf</span></a>
  </nav>

  <!-- Виньетка поверх сцены -->
  <div id="vignette"></div>

  <!-- Project List View -->
  <div id="project-list-view">
    <ul class="pl-list" id="pl-list"></ul>
  </div>

  <!-- Модальное окно -->
  <div id="modal-overlay">
    <div id="modal-content">
      <!-- Контент генерируется динамически в main.js -->
    </div>
  </div>

  <!-- Email внизу -->
  <div id="bottom-email">
    <a href="mailto:hello@labstudio.ai">hello@labstudio.ai</a>
  </div>

  <script type="module" src="/main.js"></script>
</body>
</html>
